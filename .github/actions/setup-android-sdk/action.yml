name: Setup Android SDK
description: Setup JDK, Android SDK, and Gradle for building Android projects

inputs:
  java-version:
    description: JDK version
    required: false
    default: '17'
  gradle-version:
    description: Gradle version
    required: false
    default: '9.5.0'
  compile-sdk:
    description: Android compile SDK version
    required: false
    default: '36'
  build-tools:
    description: Android build tools version
    required: false
    default: '36.0.0'
  cache-read-only:
    description: Whether Gradle cache is read-only
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: temurin
        cache: gradle

    - name: Install Android SDK Packages
      shell: bash
      run: |
        export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
        export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
        
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        if [ ! -f "$SDKMANAGER" ]; then
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/bin/sdkmanager"
        fi
        if [ ! -f "$SDKMANAGER" ]; then
          SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
        fi
        
        echo "Using sdkmanager: $SDKMANAGER"
        echo "ANDROID_HOME: $ANDROID_HOME"
        
        yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
        "$SDKMANAGER" "platforms;android-${{ inputs.compile-sdk }}" "build-tools;${{ inputs.build-tools }}" "platform-tools" 2>&1 || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: ${{ inputs.gradle-version }}
        cache-read-only: ${{ inputs.cache-read-only }}

    - name: Grant Gradlew Execute Permission
      shell: bash
      run: chmod +x gradlew || true
