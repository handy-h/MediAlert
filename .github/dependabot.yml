# Dependabot 配置
# 自动检查依赖更新并创建 PR

version: 2
updates:
  # Gradle 依赖
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    reviewers:
      - "mikelon"  # 替换为你的 GitHub 用户名
    assignees:
      - "mikelon"
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"
    # 分组更新，减少 PR 数量
    groups:
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - "minor"
          - "patch"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "junit*"
          - "io.mockk*"
          - "androidx.test*"
        update-types:
          - "minor"
          - "patch"
    # 忽略某些依赖 (如果需要)
    # ignore:
    #   - dependency-name: "androidx.compose:compose-bom"
    #     versions: ["2024.05.00"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    reviewers:
      - "mikelon"
    assignees:
      - "mikelon"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "actions/*"
        update-types:
          - "minor"
          - "patch"
