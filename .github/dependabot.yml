# Dependabot 配置
# 自动检查依赖更新并创建 PR

version: 2
updates:
  # Gradle 依赖
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    reviewers:
      - "your-username"  # 替换为你的 GitHub 用户名
    assignees:
      - "your-username"
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"
    # 忽略某些依赖 (如果需要)
    # ignore:
    #   - dependency-name: "androidx.compose:compose-bom"
    #     versions: ["2024.05.00"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    reviewers:
      - "your-username"
    assignees:
      - "your-username"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
