# ж–°еўһ: дҫқиө–жӣҙж–°е·ҘдҪңжө?name: Dependency Update

on:
  schedule:
    # жҜҸе‘ЁдёүдёҠеҚ?10:00 иҝҗиЎҢ (UTC+8 еҜ№еә” 02:00 UTC)
    - cron: '0 2 * * 3'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'

jobs:
  # жЈҖжҹҘе№¶еҲӣе»әдҫқиө–жӣҙж–° PR
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # жЈҖжҹҘдҫқиө–жӣҙж–?      - name: Check for Updates
        id: check-updates
        run: |
          ./gradlew dependencyUpdates -Drevision=release --continue || true
          
          if [ -f "build/dependencyUpdates/report.txt" ]; then
            cat build/dependencyUpdates/report.txt
            
            # жЈҖжҹҘжҳҜеҗҰжңүеҸҜжӣҙж–°йЎ№
            if grep -q "->" build/dependencyUpdates/report.txt; then
              echo "has_updates=true" >> $GITHUB_OUTPUT
            else
              echo "has_updates=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      # еҲӣе»әжӣҙж–°еҲҶж”Ҝе’?PR
      - name: Create Update PR
        if: steps.check-updates.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // иҜ»еҸ–жӣҙж–°жҠҘе‘Ҡ
            let report = '';
            try {
              report = fs.readFileSync('build/dependencyUpdates/report.txt', 'utf8');
            } catch (e) {
              console.log('No report file found');
              return;
            }
            
            const date = new Date().toISOString().split('T')[0];
            const branchName = `deps/update-${date}`;
            const title = `рҹ“Ұ Dependency Updates - ${date}`;
            const body = `## Automated Dependency Updates\n\n\`\`\`\n${report}\n\`\`\`\n\n*This PR was automatically generated by the dependency update workflow.*`;
            
            // жЈҖжҹҘжҳҜеҗҰе·ІеӯҳеңЁзӣёеҗҢеҲҶж”Ҝзҡ?PR
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branchName}`
            });
            
            if (pulls.data.length > 0) {
              console.log(`PR already exists: #${pulls.data[0].number}`);
              return;
            }
            
            // еҲӣе»әеҲҶж”Ҝ
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });
            
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: ref.object.sha
            });
            
            // еҲӣе»ә PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              head: branchName,
              base: 'main',
              labels: ['dependencies', 'automated']
            });
            
            console.log(`Created PR: #${pr.number}`);
        continue-on-error: true

      # иҝҗиЎҢжөӢиҜ•йӘҢиҜҒжӣҙж–°
      - name: Run Tests
        if: steps.check-updates.outputs.has_updates == 'true'
        run: |
          ./gradlew testDebugUnitTest --continue || true
