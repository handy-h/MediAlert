name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ env.VERSION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Validate Version Format
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            echo "Expected format: x.y.z (e.g. 1.2.1)"
            exit 1
          fi
          
          echo "Valid version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check Version in build.gradle.kts
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          APP_VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts || echo "")
          
          if [ "$APP_VERSION" != "$VERSION" ]; then
            echo "Warning: Git tag version ($VERSION) does not match build.gradle.kts version ($APP_VERSION)"
            echo "Please update the version in build.gradle.kts before releasing."
          else
            echo "Version matches: $VERSION"
          fi

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Build Environment
        uses: ./.github/actions/setup-android-sdk
        with:
          java-version: ${{ env.JAVA_VERSION }}
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Decode Release Signing Key
        run: |
          echo "${{ secrets.RELEASE_SIGNING_KEY }}" | base64 -d > app/release.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Build Release AAB
        run: ./gradlew bundleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Verify APK Signature
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release.apk || true

      - name: Generate Checksums
        run: |
          cd app/build/outputs
          echo "# MediAlert Release Checksums" > checksums.txt
          echo "Version: ${{ env.VERSION }}" >> checksums.txt
          echo "Date: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> checksums.txt
          echo "Commit: ${{ github.sha }}" >> checksums.txt
          echo "" >> checksums.txt
          echo "APK SHA256:" >> checksums.txt
          sha256sum apk/release/*.apk >> checksums.txt
          echo "" >> checksums.txt
          echo "AAB SHA256:" >> checksums.txt
          sha256sum bundle/release/*.aab >> checksums.txt

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: app/build/outputs/checksums.txt
          retention-days: 30

      - name: Clean Signing Key
        if: always()
        run: rm -f app/release.jks

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./artifacts/apk

      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: ./artifacts/aab

      - name: Download Checksums
        uses: actions/download-artifact@v4
        with:
          name: release-checksums
          path: ./artifacts

      - name: Generate Release Notes
        run: |
          cat > release-notes.md << EOF
          # MediAlert v${{ env.VERSION }}
          
          ## Downloads
          - **APK**: Direct install for Android devices
          - **AAB**: For Google Play Store upload
          
          ## Verification
          Verify file integrity using SHA256 checksums:
          
          \`\`\`
          $(cat ./artifacts/checksums.txt | grep -v "^#")
          \`\`\`
          
          ## Installation
          1. Download the APK file
          2. Enable "Install from unknown sources" in Android settings
          3. Install the APK
          
          ---
          *This Release was created automatically by GitHub Actions.*
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "MediAlert v${{ env.VERSION }}"
          body_path: release-notes.md
          files: |
            ./artifacts/apk/*.apk
            ./artifacts/aab/*.aab
            ./artifacts/checksums.txt
          prerelease: ${{ github.event.inputs.prerelease || false }}
          token: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: create-release
    if: always()
    timeout-minutes: 5
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != '' && needs.create-release.result == 'success'
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "MediAlert new release published",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MediAlert New Release Published"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\nv${{ env.VERSION }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Type:*\n${{ github.event.inputs.prerelease && 'Prerelease' || 'Stable Release' }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Release"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ env.VERSION }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
