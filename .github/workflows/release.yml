# 新增: 发布工作流
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.2.1)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'

jobs:
  # 验证版本
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Version Format
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 版本号格式错误: $VERSION"
            echo "期望格式: x.y.z (例如: 1.2.1)"
            exit 1
          fi
          
          echo "✅ 版本号格式正确: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check Version in build.gradle.kts
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          APP_VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts || echo "")
          
          if [ "$APP_VERSION" != "$VERSION" ]; then
            echo "⚠️ 警告: Git 标签版本 ($VERSION) 与 build.gradle.kts 中的版本 ($APP_VERSION) 不一致"
            echo "请确保版本号已更新"
          else
            echo "✅ 版本号一致: $VERSION"
          fi

  # 构建 Release
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew

      # 解码 Release 签名密钥
      - name: Decode Release Signing Key
        run: |
          echo "${{ secrets.RELEASE_SIGNING_KEY }}" | base64 -d > app/release.jks

      # 构建 Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      # 构建 Release AAB
      - name: Build Release AAB
        run: ./gradlew bundleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      # 验证签名
      - name: Verify APK Signature
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release.apk || true

      # 计算哈希值
      - name: Calculate Checksums
        run: |
          cd app/build/outputs
          echo "# MediAlert Release Checksums" > checksums.txt
          echo "Version: ${{ env.VERSION }}" >> checksums.txt
          echo "Date: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> checksums.txt
          echo "Commit: ${{ github.sha }}" >> checksums.txt
          echo "" >> checksums.txt
          echo "APK SHA256:" >> checksums.txt
          sha256sum apk/release/*.apk >> checksums.txt
          echo "" >> checksums.txt
          echo "AAB SHA256:" >> checksums.txt
          sha256sum bundle/release/*.aab >> checksums.txt

      # 上传构建产物
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: app/build/outputs/checksums.txt
          retention-days: 30

      # 清理签名密钥
      - name: Clean Signing Key
        if: always()
        run: rm -f app/release.jks

  # 创建 GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./artifacts/apk

      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: ./artifacts/aab

      - name: Download Checksums
        uses: actions/download-artifact@v4
        with:
          name: release-checksums
          path: ./artifacts

      - name: Generate Release Notes
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          cat > release-notes.md << EOF
          ## 🎉 MediAlert v${VERSION}
          
          ### 下载
          
          - **APK**: 适用于直接安装到 Android 设备
          - **AAB**: 适用于 Google Play 发布
          
          ### 校验
          
          请验证下载文件的 SHA256 校验和：
          
          \`\`\`
          $(cat ./artifacts/checksums.txt | grep -v "^#")
          \`\`\`
          
          ### 安装
          
          1. 下载 APK 文件
          2. 在 Android 设备上允许安装未知来源应用
          3. 安装 APK
          
          ---
          *此 Release 由 GitHub Actions 自动生成*
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "MediAlert v${{ env.VERSION }}"
          body_path: release-notes.md
          files: |
            ./artifacts/apk/*.apk
            ./artifacts/aab/*.aab
            ./artifacts/checksums.txt
          prerelease: ${{ github.event.inputs.prerelease || false }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # 通知
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: create-release
    if: always()
    timeout-minutes: 5
    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != '' && needs.create-release.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🎉 MediAlert 新版本发布！",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🎉 MediAlert 新版本发布"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*版本:*\nv${{ env.VERSION }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*类型:*\n${{ github.event.inputs.prerelease && '预发布' || '正式版' }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "查看 Release"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ env.VERSION }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
