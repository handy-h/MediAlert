name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'йғЁзҪІзҺҜеўғ'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      build_type:
        description: 'жһ„е»әзұ»еһӢ'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      notify:
        description: 'еҸ‘йҖҒйҖҡзҹҘ'
        required: false
        default: true
        type: boolean

# е№¶еҸ‘жҺ§еҲ¶пјҡз”ҹдә§зҺҜеўғеҸӘиғҪжңүдёҖдёӘйғЁзҪІеңЁиҝӣиЎҢ
concurrency:
  group: manual-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

jobs:
  # йӘҢиҜҒиҫ“е…Ҙ
  validate:
    name: Validate Input
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Environment
        run: |
          ENV="${{ github.event.inputs.environment }}"
          REF="${{ github.ref }}"
          
          echo "Environment: $ENV"
          echo "Ref: $REF"
          
          if [ "$ENV" == "production" ] && [ "$REF" != "refs/heads/main" ]; then
            echo "вқ?з”ҹдә§зҺҜеўғеҸӘиғҪд»?main еҲҶж”ҜйғЁзҪІ"
            echo "еҪ“еүҚеҲҶж”Ҝ: $REF"
            exit 1
          fi
          
          echo "вң?зҺҜеўғйӘҢиҜҒйҖҡиҝҮ"

      - name: Log Deploy Info
        run: |
          echo "рҹҡҖ жүӢеҠЁйғЁзҪІеҗҜеҠЁ"
          echo "зҺҜеўғ: ${{ github.event.inputs.environment }}"
          echo "жһ„е»әзұ»еһӢ: ${{ github.event.inputs.build_type }}"
          echo "и§ҰеҸ‘иҖ? ${{ github.actor }}"
          echo "ж—¶й—ҙ: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"

  # жһ„е»ә
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # ж №жҚ®иҫ“е…ҘйҖүжӢ©жһ„е»әзұ»еһӢ
      - name: Build Debug
        if: github.event.inputs.build_type == 'debug'
        run: ./gradlew assembleDebug

      - name: Build Release
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      # зӯҫеҗҚ Release APK
      - name: Sign Release APK
        if: github.event.inputs.build_type == 'release'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.RELEASE_SIGNING_KEY }}
          alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_STORE_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        continue-on-error: true

      # дёҠдј жһ„е»әдә§зү©
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: manual-build-${{ github.event.inputs.environment }}-${{ github.event.inputs.build_type }}-${{ github.run_id }}
          path: app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk
          retention-days: 14
          if-no-files-found: error

      # иҫ“еҮәжһ„е»әдҝЎжҒҜ
      - name: Output Build Info
        run: |
          echo "вң?жһ„е»әе®ҢжҲҗ"
          ls -lh app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk || true

  # йғЁзҪІеҲ?Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'staging'
    timeout-minutes: 15
    steps:
      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: manual-build-staging-${{ github.event.inputs.build_type }}-${{ github.run_id }}
          path: ./artifacts

      # йғЁзҪІеҲ?Firebase App Distribution
      - name: Deploy to Firebase App Distribution
        if: env.FIREBASE_APP_ID != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: staging-testers
          file: ./artifacts/app-${{ github.event.inputs.build_type }}.apk
        continue-on-error: true
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      # еҲӣе»ә GitHub Release Draft (Staging)
      - name: Create Staging Release Draft
        if: github.event.inputs.build_type == 'release'
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: true
          name: "Staging Build - ${{ github.run_id }}"
          body: |
            ## рҹ§Ә Staging Build
            
            - **зҺҜеўғ**: Staging
            - **жһ„е»әзұ»еһӢ**: ${{ github.event.inputs.build_type }}
            - **и§ҰеҸ‘иҖ?*: ${{ github.actor }}
            - **ж—¶й—ҙ**: ${{ github.event.repository.updated_at }}
            - **Commit**: ${{ github.sha }}
          files: ./artifacts/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Staging Deploy Info
        run: |
          echo "вң?Staging йғЁзҪІе®ҢжҲҗ"
          echo "жһ„е»әзұ»еһӢ: ${{ github.event.inputs.build_type }}"
          echo "зҺҜеўғ: ${{ github.event.inputs.environment }}"
          echo "дә§зү©:"
          ls -lh ./artifacts/*.apk || true

  # йғЁзҪІеҲ?Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'production'
    environment: production
    timeout-minutes: 15
    steps:
      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: manual-build-production-${{ github.event.inputs.build_type }}-${{ github.run_id }}
          path: ./artifacts

      # еҲӣе»ә GitHub Release Draft
      - name: Create Production Release Draft
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          name: "Production Build - ${{ github.run_id }}"
          body: |
            ## рҹҡҖ Production Build
            
            - **зҺҜеўғ**: Production
            - **жһ„е»әзұ»еһӢ**: ${{ github.event.inputs.build_type }}
            - **и§ҰеҸ‘иҖ?*: ${{ github.actor }}
            - **ж—¶й—ҙ**: ${{ github.event.repository.updated_at }}
            - **Commit**: ${{ github.sha }}
            
            вҡ пёҸ иҜ·йӘҢиҜҒеҗҺеҶҚеҸ‘еёғжӯӨ ReleaseгҖ?          files: ./artifacts/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Production Deploy Info
        run: |
          echo "вң?Production йғЁзҪІе®ҢжҲҗ"
          echo "жһ„е»әзұ»еһӢ: ${{ github.event.inputs.build_type }}"
          echo "зҺҜеўғ: ${{ github.event.inputs.environment }}"
          echo "дә§зү©:"
          ls -lh ./artifacts/*.apk || true

  # йҖҡзҹҘ
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && github.event.inputs.notify == 'true'
    timeout-minutes: 5
    steps:
      - name: Determine Deploy Status
        id: deploy-status
        run: |
          STAGING_RESULT="${{ needs.deploy-staging.result }}"
          PROD_RESULT="${{ needs.deploy-production.result }}"
          
          if [ "$STAGING_RESULT" == "success" ] || [ "$PROD_RESULT" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
          
          echo "Staging: $STAGING_RESULT"
          echo "Production: $PROD_RESULT"

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "рҹҡҖ MediAlert жүӢеҠЁйғЁзҪІе®ҢжҲҗ",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "рҹҡҖ MediAlert жүӢеҠЁйғЁзҪІжҠҘе‘Ҡ"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*зҺҜеўғ:*\n${{ github.event.inputs.environment }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*жһ„е»әзұ»еһӢ:*\n${{ github.event.inputs.build_type }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*и§ҰеҸ‘иҖ?*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*зҠ¶жҖ?*\n${{ steps.deploy-status.outputs.status == 'success' && 'вң?жҲҗеҠҹ' || 'вқ?еӨұиҙҘ' }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "жҹҘзңӢиҜҰжғ…"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
