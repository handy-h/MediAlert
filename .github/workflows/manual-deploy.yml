name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

concurrency:
  group: manual-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate Environment
        run: |
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Build type: ${{ github.event.inputs.build_type }}"
          
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "Production deployment requires manual confirmation."
            echo "Please ensure all tests pass before proceeding."
          fi

  build:
    name: Build (${{ github.event.inputs.build_type }})
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Build Environment
        uses: ./.github/actions/setup-android-sdk
        with:
          java-version: ${{ env.JAVA_VERSION }}
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug'
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.RELEASE_SIGNING_KEY }}" | base64 -d > app/release.jks
          ./gradlew assembleRelease
          rm -f app/release.jks
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Build Release AAB
        if: github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.RELEASE_SIGNING_KEY }}" | base64 -d > app/release.jks
          ./gradlew bundleRelease
          rm -f app/release.jks
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: manual-deploy-debug-${{ github.run_id }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: manual-deploy-release-apk-${{ github.run_id }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload Release AAB
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: manual-deploy-release-aab-${{ github.run_id }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14
          if-no-files-found: error

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'staging'
    timeout-minutes: 10
    environment: staging
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: manual-deploy-${{ github.event.inputs.build_type == 'release' && 'release-apk' || 'debug' }}-${{ github.run_id }}
          path: ./artifacts

      - name: Generate Staging Info
        run: |
          cat > staging-info.md << EOF
          # Staging Deployment Info
          
          - **Build Type**: ${{ github.event.inputs.build_type }}
          - **Deployed at**: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)
          - **Commit**: ${{ github.sha }}
          - **Triggered by**: ${{ github.actor }}
          
          ## Artifacts
          $(ls -lh ./artifacts/*.apk 2>/dev/null || echo "No APK found")
          $(ls -lh ./artifacts/*.aab 2>/dev/null || echo "No AAB found")
          EOF
          cat staging-info.md

      - name: Upload Deployment Info
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-info-${{ github.run_id }}
          path: staging-info.md
          retention-days: 7

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'production'
    timeout-minutes: 15
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: manual-deploy-release-apk-${{ github.run_id }}
          path: ./artifacts

      - name: Verify Release Artifact
        run: |
          if [ ! -f ./artifacts/app-release.apk ]; then
            echo "Release APK not found!"
            exit 1
          fi
          echo "Release APK verified:"
          ls -lh ./artifacts/*.apk

      - name: Generate Production Info
        run: |
          cat > production-info.md << EOF
          # Production Deployment Info
          
          - **Version**: ${{ github.sha }}
          - **Deployed at**: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)
          - **Triggered by**: ${{ github.actor }}
          - **Commit**: ${{ github.sha }}
          
          ## Artifacts
          $(sha256sum ./artifacts/*.apk)
          
          ## Pre-deployment Checklist
          - [ ] All tests passed
          - [ ] Code review approved
          - [ ] Staging deployment verified
          - [ ] Release notes prepared
          EOF
          cat production-info.md

      - name: Upload Production Info
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-info-${{ github.run_id }}
          path: production-info.md
          retention-days: 30

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build, deploy-staging, deploy-production]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ] || [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "MediAlert Manual Deployment",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MediAlert Manual Deployment"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\n${{ github.event.inputs.environment }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Build Type:*\n${{ github.event.inputs.build_type }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ steps.status.outputs.status == 'success' && 'Success' || 'Failed' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Details"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
