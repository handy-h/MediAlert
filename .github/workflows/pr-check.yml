name: PR Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# е№¶еҸ‘жҺ§еҲ¶пјҡеҗҢдёҖ PR еҸӘдҝқз•ҷжңҖж–°жЈҖжҹ?concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

jobs:
  # еҝ«йҖҹжЈҖжҹ?- ең?PR еҲӣе»әж—¶з«ӢеҚіжү§иЎ?  pr-quick-check:
    name: PR Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # еҝ«йҖҹзј–иҜ‘жЈҖжҹ?      - name: Compile Check
        run: ./gradlew compileDebugKotlin compileDebugJavaWithJavac --continue

      # еҝ«йҖ?Lint жЈҖжҹ?      - name: Quick Lint Check
        run: ./gradlew lintDebug --continue || true

      # жЈҖжҹҘд»Јз Ғж јеј?(ktlint)
      - name: Check Code Format
        run: ./gradlew ktlintCheck --continue || true

      # еҝ«йҖ?Detekt жЈҖжҹ?      - name: Quick Detekt Check
        run: ./gradlew detekt --continue || true

  # PR иҜҰз»ҶжЈҖжҹ?  pr-detailed-check:
    name: PR Detailed Check
    runs-on: ubuntu-latest
    needs: pr-quick-check
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # иҺ·еҸ–еҸҳжӣҙж–Үд»¶еҲ—иЎЁ
      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.kt
            **/*.java
            **/*.xml
            **/*.gradle
            **/*.kts

      # жҳҫзӨәеҸҳжӣҙж–Үд»¶
      - name: List Changed Files
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
          echo ""
          echo "Changed file count: ${{ steps.changed-files.outputs.all_changed_files_count }}"

      # иҝҗиЎҢеҚ•е…ғжөӢиҜ•
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # з”ҹжҲҗжөӢиҜ•жҠҘе‘Ҡ
      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PR Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      # жһ„е»ә Debug APK (йӘҢиҜҒжһ„е»әжҳҜеҗҰжҲҗеҠҹ)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # дёҠдј жһ„е»әдә§зү©
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pr-debug-apk-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 3
          if-no-files-found: error

      # PR иҜ„и®ә - жөӢиҜ•з»“жһң
      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'app/build/test-results/testDebugUnitTest';
            
            let testResults = '';
            let totalTests = 0;
            let totalFailures = 0;
            let totalErrors = 0;
            let totalSkipped = 0;
            
            try {
              const files = fs.readdirSync(path);
              for (const file of files) {
                if (file.endsWith('.xml')) {
                  const content = fs.readFileSync(`${path}/${file}`, 'utf8');
                  // и§Јжһҗ XML
                  const testsMatch = content.match(/tests="(\d+)"/);
                  const failuresMatch = content.match(/failures="(\d+)"/);
                  const errorsMatch = content.match(/errors="(\d+)"/);
                  const skippedMatch = content.match(/skipped="(\d+)"/);
                  
                  const tests = testsMatch ? parseInt(testsMatch[1]) : 0;
                  const failures = failuresMatch ? parseInt(failuresMatch[1]) : 0;
                  const errors = errorsMatch ? parseInt(errorsMatch[1]) : 0;
                  const skipped = skippedMatch ? parseInt(skippedMatch[1]) : 0;
                  
                  totalTests += tests;
                  totalFailures += failures;
                  totalErrors += errors;
                  totalSkipped += skipped;
                }
              }
              
              const successRate = totalTests > 0 ? ((totalTests - totalFailures - totalErrors) / totalTests * 100).toFixed(1) : 0;
              
              testResults = `рҹ“Ҡ **жөӢиҜ•з»“жһң**: ${totalTests} жөӢиҜ•, ${totalFailures} еӨұиҙҘ, ${totalErrors} й”ҷиҜҜ, ${totalSkipped} и·іиҝҮ\n`;
              testResults += `вң?**жҲҗеҠҹзҺ?*: ${successRate}%\n`;
              
              if (totalFailures > 0 || totalErrors > 0) {
                testResults += `\nвҡ пёҸ **еӯҳеңЁеӨұиҙҘзҡ„жөӢиҜ•пјҢиҜ·жЈҖжҹҘе№¶дҝ®еӨҚгҖ?*\n`;
              }
            } catch (e) {
              testResults = 'вҡ пёҸ ж— жі•иҜ»еҸ–жөӢиҜ•з»“жһң\n';
              console.error(e);
            }
            
            const buildStatus = '${{ job.status }}' === 'success' ? 'вң? : 'вқ?;
            
            const body = `## рҹӨ– PR иҮӘеҠЁеҢ–жЈҖжҹҘз»“жһң\n\n${testResults}\nрҹ“Ұ **жһ„е»әзҠ¶жҖ?*: ${buildStatus} Debug APK жһ„е»ә\n\n*з”?GitHub Actions иҮӘеҠЁз”ҹжҲҗ*`;
            
            // жҹҘжүҫжҳҜеҗҰе·ІжңүиҜ„и®ә
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const botComment = comments.data.find(comment => 
              comment.body.includes('рҹӨ– PR иҮӘеҠЁеҢ–жЈҖжҹҘз»“жһ?)
            );
            
            if (botComment) {
              // жӣҙж–°зҺ°жңүиҜ„и®ә
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              // еҲӣе»әж–°иҜ„и®?              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  # PR ж Үзӯҫз®ЎзҗҶ
  pr-labeler:
    name: PR Labeler
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Label PR (if labeler config exists)
        uses: actions/labeler@v5
        if: hashFiles('.github/labeler.yml') != ''
        with:
          configuration-path: .github/labeler.yml
        continue-on-error: true

      # ж №жҚ®еҲҶж”ҜеҗҚиҮӘеҠЁж·»еҠ ж Үзӯ?      - name: Auto Label by Branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];
            
            if (branch.startsWith('feature/')) {
              labels.push('feature');
            } else if (branch.startsWith('bugfix/') || branch.startsWith('fix/')) {
              labels.push('bugfix');
            } else if (branch.startsWith('hotfix/')) {
              labels.push('hotfix');
            } else if (branch.startsWith('release/')) {
              labels.push('release');
            } else if (branch.startsWith('docs/')) {
              labels.push('documentation');
            } else if (branch.startsWith('refactor/')) {
              labels.push('refactor');
            } else if (branch.startsWith('test/')) {
              labels.push('tests');
            } else if (branch.startsWith('chore/')) {
              labels.push('chore');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            } else {
              console.log('No matching labels for branch:', branch);
            }

  # жЈҖжҹ?PR жҸҸиҝ°
  pr-description-check:
    name: Check PR Description
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // жЈҖжҹ?PR жҸҸиҝ°жҳҜеҗҰеҢ…еҗ«еҝ…иҰҒдҝЎжҒҜ
            const checks = {
              hasDescription: body.length > 50,
              hasIssue: body.includes('#') || body.includes('issue') || body.includes('Issue') || body.includes(' closes ') || body.includes(' fixes '),
              hasChanges: body.includes('еҸҳжӣҙ') || body.includes('change') || body.includes('дҝ®ж”№') || body.includes('Changes') || body.includes('ж”№еҠЁ'),
              hasType: body.includes('зұ»еһӢ') || body.includes('Type') || body.includes('зұ»еһӢ') || body.includes('feature') || body.includes('bugfix') || body.includes('hotfix')
            };
            
            let message = '## рҹ“Ӣ PR жҸҸиҝ°жЈҖжҹҘ\n\n';
            let allPassed = true;
            
            if (checks.hasDescription) {
              message += 'вң?еҢ…еҗ«и¶іеӨҹзҡ„жҸҸиҝ°\n';
            } else {
              message += 'вҡ пёҸ е»әи®®ж·»еҠ жӣҙиҜҰз»Ҷзҡ„жҸҸиҝ°\n';
              allPassed = false;
            }
            
            if (checks.hasIssue) {
              message += 'вң?е…іиҒ”дәҶзӣёе…?Issue\n';
            } else {
              message += 'рҹ’Ў е»әи®®е…іиҒ”зӣёе…і IssueпјҲдҪҝз”?`#123` жҲ?`closes #123`пјү\n';
            }
            
            if (checks.hasChanges) {
              message += 'вң?иҜҙжҳҺдәҶеҸҳжӣҙеҶ…е®№\n';
            } else {
              message += 'рҹ’Ў е»әи®®иҜҙжҳҺе…·дҪ“зҡ„еҸҳжӣҙеҶ…е®№\n';
              allPassed = false;
            }
            
            if (allPassed) {
              message += '\nрҹҺү PR жҸҸиҝ°жЈҖжҹҘйҖҡиҝҮпј?;
            } else {
              message += '\nрҹ’Ў жҸҗзӨә: иҜ·иЎҘе…?PR жҸҸиҝ°пјҢиҜҙжҳҺеҸҳжӣҙеҶ…е®№е’ҢеҺҹеӣ гҖ?;
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # PR еӨ§е°ҸжЈҖжҹ?  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            let totalAdditions = 0;
            let totalDeletions = 0;
            let totalChanges = 0;
            
            for (const file of files) {
              totalAdditions += file.additions;
              totalDeletions += file.deletions;
              totalChanges += file.changes;
            }
            
            let sizeLabel = '';
            let message = '';
            
            if (totalChanges <= 50) {
              sizeLabel = 'size: XS';
              message = 'вң?PR еӨ§е°ҸеҗҲйҖ?(XS)';
            } else if (totalChanges <= 100) {
              sizeLabel = 'size: S';
              message = 'вң?PR еӨ§е°ҸеҗҲйҖ?(S)';
            } else if (totalChanges <= 300) {
              sizeLabel = 'size: M';
              message = 'вҡ пёҸ PR еӨ§е°Ҹдёӯзӯү (M)пјҢе»әи®®иҖғиҷ‘жӢҶеҲҶ';
            } else if (totalChanges <= 500) {
              sizeLabel = 'size: L';
              message = 'вҡ пёҸ PR иҫғеӨ§ (L)пјҢејәзғҲе»әи®®жӢҶеҲҶдёәеӨҡдёӘе°?PR';
            } else {
              sizeLabel = 'size: XL';
              message = 'вқ?PR иҝҮеӨ§ (XL)пјҢеҝ…йЎ»жӢҶеҲҶд»ҘжҸҗй«ҳд»Јз Ғе®ЎжҹҘиҙЁйҮҸ';
            }
            
            // ж·»еҠ еӨ§е°Ҹж Үзӯҫ
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [sizeLabel]
              });
            } catch (e) {
              console.log('Label may already exist');
            }
            
            console.log(`PR Size: ${totalChanges} changes (${totalAdditions} additions, ${totalDeletions} deletions)`);
            console.log(message);

  # жЈҖжҹ?PR жҳҜеҗҰеҸҜеҗҲе№?  pr-merge-check:
    name: PR Merge Check
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    timeout-minutes: 5
    needs: [pr-quick-check, pr-detailed-check]
    steps:
      - name: Check Merge Requirements
        uses: actions/github-script@v7
        with:
          script: |
            const quickCheck = '${{ needs.pr-quick-check.result }}';
            const detailedCheck = '${{ needs.pr-detailed-check.result }}';
            
            let status = 'success';
            let message = '## вң?PR еҗҲе№¶жЈҖжҹҘ\n\n';
            
            if (quickCheck === 'success') {
              message += '- вң?еҝ«йҖҹжЈҖжҹҘйҖҡиҝҮ\n';
            } else {
              message += '- вқ?еҝ«йҖҹжЈҖжҹҘеӨұиҙҘ\n';
              status = 'failure';
            }
            
            if (detailedCheck === 'success') {
              message += '- вң?иҜҰз»ҶжЈҖжҹҘйҖҡиҝҮ\n';
            } else {
              message += '- вқ?иҜҰз»ҶжЈҖжҹҘеӨұиҙҘ\n';
              status = 'failure';
            }
            
            if (status === 'success') {
              message += '\nрҹҺү жүҖжңүжЈҖжҹҘйҖҡиҝҮпјҢеҸҜд»ҘеҗҲе№¶пјҒ';
            } else {
              message += '\nвҡ пёҸ иҜ·дҝ®еӨҚдёҠиҝ°й—®йўҳеҗҺеҶҚеҗҲе№¶гҖ?;
            }
            
            // и®ҫзҪ® commit status
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: status,
              context: 'PR Merge Check',
              description: status === 'success' ? 'All checks passed' : 'Some checks failed'
            });
        continue-on-error: true
