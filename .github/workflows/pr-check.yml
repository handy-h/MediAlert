name: PR Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

jobs:
  quick-check:
    name: PR Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-android-sdk
        with:
          java-version: ${{ env.JAVA_VERSION }}
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Compile Check
        run: ./gradlew compileDebugKotlin compileDebugJavaWithJavac --continue

      - name: Lint Check
        run: ./gradlew lintDebug --continue || true

      - name: Check Code Format
        run: ./gradlew ktlintCheck --continue || true

      - name: Detekt Check
        run: ./gradlew detekt --continue || true

  detailed-check:
    name: PR Detailed Check
    runs-on: ubuntu-latest
    needs: quick-check
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-android-sdk
        with:
          java-version: ${{ env.JAVA_VERSION }}
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.kt
            **/*.java
            **/*.xml
            **/*.gradle
            **/*.kts

      - name: List Changed Files
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
          echo ""
          echo "Changed file count: ${{ steps.changed-files.outputs.all_changed_files_count }}"

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PR Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pr-debug-apk-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 3
          if-no-files-found: error

      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'app/build/test-results/testDebugUnitTest';
            
            let testResults = '';
            let totalTests = 0;
            let totalFailures = 0;
            let totalErrors = 0;
            let totalSkipped = 0;
            
            try {
              const files = fs.readdirSync(path);
              for (const file of files) {
                if (file.endsWith('.xml')) {
                  const content = fs.readFileSync(`${path}/${file}`, 'utf8');
                  const testsMatch = content.match(/tests="(\d+)"/);
                  const failuresMatch = content.match(/failures="(\d+)"/);
                  const errorsMatch = content.match(/errors="(\d+)"/);
                  const skippedMatch = content.match(/skipped="(\d+)"/);
                  
                  const tests = testsMatch ? parseInt(testsMatch[1]) : 0;
                  const failures = failuresMatch ? parseInt(failuresMatch[1]) : 0;
                  const errors = errorsMatch ? parseInt(errorsMatch[1]) : 0;
                  const skipped = skippedMatch ? parseInt(skippedMatch[1]) : 0;
                  
                  totalTests += tests;
                  totalFailures += failures;
                  totalErrors += errors;
                  totalSkipped += skipped;
                }
              }
              
              const successRate = totalTests > 0 ? ((totalTests - totalFailures - totalErrors) / totalTests * 100).toFixed(1) : 0;
              
              testResults = `**Test Results**: ${totalTests} tests, ${totalFailures} failures, ${totalErrors} errors, ${totalSkipped} skipped\n`;
              testResults += `**Success Rate**: ${successRate}%\n`;
              
              if (totalFailures > 0 || totalErrors > 0) {
                testResults += `\n**Warning**: There are failing tests, please check and fix.\n`;
              }
            } catch (e) {
              testResults = 'Could not read test results\n';
              console.error(e);
            }
            
            const buildStatus = '${{ job.status }}' === 'success' ? 'OK' : 'FAILED';
            
            const body = `## PR Automated Check Results\n\n${testResults}\n**Build Status**: ${buildStatus} Debug APK build\n\n*Generated by GitHub Actions*`;
            
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const botComment = comments.data.find(comment => 
              comment.body.includes('PR Automated Check Results')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  # PR Labeler
  pr-labeler:
    name: PR Labeler
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        if: hashFiles('.github/labeler.yml') != ''
        with:
          configuration-path: .github/labeler.yml
        continue-on-error: true

      - name: Label by Branch Name
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];
            
            if (branch.startsWith('feature/')) {
              labels.push('feature');
            } else if (branch.startsWith('bugfix/') || branch.startsWith('fix/')) {
              labels.push('bugfix');
            } else if (branch.startsWith('hotfix/')) {
              labels.push('hotfix');
            } else if (branch.startsWith('release/')) {
              labels.push('release');
            } else if (branch.startsWith('docs/')) {
              labels.push('documentation');
            } else if (branch.startsWith('refactor/')) {
              labels.push('refactor');
            } else if (branch.startsWith('test/')) {
              labels.push('tests');
            } else if (branch.startsWith('chore/')) {
              labels.push('chore');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            } else {
              console.log('No matching labels for branch:', branch);
            }

  # PR Description Check
  pr-description-check:
    name: Check PR Description
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            const checks = {
              hasDescription: body.length > 50,
              hasIssue: body.includes('#') || body.includes('issue') || body.includes('closes') || body.includes('fixes'),
              hasChanges: body.includes('change') || body.includes('修改') || body.includes('改动') || body.includes('Changes'),
              hasType: body.includes('Type') || body.includes('feature') || body.includes('bugfix') || body.includes('hotfix')
            };
            
            let message = '## PR Description Check\n\n';
            let allPassed = true;
            
            if (checks.hasDescription) {
              message += '- [x] Has sufficient description\n';
            } else {
              message += '- [ ] Suggest adding a more detailed description\n';
              allPassed = false;
            }
            
            if (checks.hasIssue) {
              message += '- [x] Linked to related Issue\n';
            } else {
              message += '- [ ] Consider linking a related Issue (use `#123` or `closes #123`)\n';
            }
            
            if (checks.hasChanges) {
              message += '- [x] Describes the changes\n';
            } else {
              message += '- [ ] Suggest describing the specific changes\n';
              allPassed = false;
            }
            
            if (allPassed) {
              message += '\nPR description check passed!';
            } else {
              message += '\nTip: Please supplement the PR description with change details and rationale.';
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # PR Size Check
  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            let totalAdditions = 0;
            let totalDeletions = 0;
            let totalChanges = 0;
            
            for (const file of files) {
              totalAdditions += file.additions;
              totalDeletions += file.deletions;
              totalChanges += file.changes;
            }
            
            let sizeLabel = '';
            let message = '';
            
            if (totalChanges <= 50) {
              sizeLabel = 'size: XS';
              message = 'PR size is appropriate (XS)';
            } else if (totalChanges <= 100) {
              sizeLabel = 'size: S';
              message = 'PR size is appropriate (S)';
            } else if (totalChanges <= 300) {
              sizeLabel = 'size: M';
              message = 'PR size is medium (M), consider splitting';
            } else if (totalChanges <= 500) {
              sizeLabel = 'size: L';
              message = 'PR is large (L), strongly recommend splitting into smaller PRs';
            } else {
              sizeLabel = 'size: XL';
              message = 'PR is too large (XL), must split to improve code review quality';
            }
            
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [sizeLabel]
              });
            } catch (e) {
              console.log('Label may already exist');
            }
            
            console.log(`PR Size: ${totalChanges} changes (${totalAdditions} additions, ${totalDeletions} deletions)`);
            console.log(message);

  # PR Merge Check
  merge-check:
    name: PR Merge Check
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    timeout-minutes: 5
    needs: [quick-check, detailed-check]
    steps:
      - name: Check Merge Requirements
        uses: actions/github-script@v7
        with:
          script: |
            const quickCheck = '${{ needs.quick-check.result }}';
            const detailedCheck = '${{ needs.detailed-check.result }}';
            
            let status = 'success';
            let message = '## PR Merge Check\n\n';
            
            if (quickCheck === 'success') {
              message += '- [x] Quick check passed\n';
            } else {
              message += '- [ ] Quick check failed\n';
              status = 'failure';
            }
            
            if (detailedCheck === 'success') {
              message += '- [x] Detailed check passed\n';
            } else {
              message += '- [ ] Detailed check failed\n';
              status = 'failure';
            }
            
            if (status === 'success') {
              message += '\nAll checks passed, ready to merge!';
            } else {
              message += '\nPlease fix the above issues before merging.';
            }
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: status,
              context: 'PR Merge Check',
              description: status === 'success' ? 'All checks passed' : 'Some checks failed'
            });
        continue-on-error: true
