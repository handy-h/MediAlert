name: PR Check

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  # 快速检查 - 在 PR 创建时立即执行
  pr-quick-check:
    name: PR Quick Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Setup Gradlew
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, creating wrapper script..."
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
          fi
          chmod +x gradlew

      # 快速编译检查
      - name: Compile Check
        run: ./gradlew compileDebugKotlin compileDebugJavaWithJavac

      # 快速 Lint 检查
      - name: Quick Lint Check
        run: ./gradlew lintDebug || true

      # 检查代码格式 (ktlint)
      - name: Check Code Format
        run: ./gradlew ktlintCheck || true

  # PR 详细检查
  pr-detailed-check:
    name: PR Detailed Check
    runs-on: ubuntu-latest
    needs: pr-quick-check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史进行变更分析

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Setup Gradlew
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, creating wrapper script..."
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
          fi
          chmod +x gradlew

      # 获取变更文件列表
      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.kt
            **/*.java
            **/*.xml
            **/*.gradle
            **/*.kts

      # 显示变更文件
      - name: List Changed Files
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

      # 运行单元测试
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # 生成测试报告
      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PR Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      # 构建 Debug APK (验证构建是否成功)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 上传构建产物
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pr-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 3

      # PR 评论 - 测试结果
      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'app/build/test-results/testDebugUnitTest';
            
            let testResults = '';
            try {
              const files = fs.readdirSync(path);
              for (const file of files) {
                if (file.endsWith('.xml')) {
                  const content = fs.readFileSync(`${path}/${file}`, 'utf8');
                  // 简单的 XML 解析
                  const testsMatch = content.match(/tests="(\d+)"/);
                  const failuresMatch = content.match(/failures="(\d+)"/);
                  const errorsMatch = content.match(/errors="(\d+)"/);
                  
                  const tests = testsMatch ? testsMatch[1] : '0';
                  const failures = failuresMatch ? failuresMatch[1] : '0';
                  const errors = errorsMatch ? errorsMatch[1] : '0';
                  
                  testResults += `📊 **测试结果**: ${tests} 测试, ${failures} 失败, ${errors} 错误\n`;
                }
              }
            } catch (e) {
              testResults = '⚠️ 无法读取测试结果';
            }
            
            const body = `## 🤖 PR 自动化检查结果\n\n${testResults}\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # PR 标签管理
  pr-labeler:
    name: PR Labeler
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
        continue-on-error: true

      # 根据分支名自动添加标签
      - name: Auto Label by Branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];
            
            if (branch.startsWith('feature/')) {
              labels.push('feature');
            } else if (branch.startsWith('bugfix/') || branch.startsWith('fix/')) {
              labels.push('bugfix');
            } else if (branch.startsWith('hotfix/')) {
              labels.push('hotfix');
            } else if (branch.startsWith('release/')) {
              labels.push('release');
            } else if (branch.startsWith('docs/')) {
              labels.push('documentation');
            }
            
            if (labels.length > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }

  # 检查 PR 描述
  pr-description-check:
    name: Check PR Description
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // 检查 PR 描述是否包含必要信息
            const checks = {
              hasDescription: body.length > 50,
              hasIssue: body.includes('#') || body.includes('issue'),
              hasChanges: body.includes('变更') || body.includes('change') || body.includes('修改')
            };
            
            let message = '## 📋 PR 描述检查\n\n';
            let allPassed = true;
            
            if (checks.hasDescription) {
              message += '✅ 包含足够的描述\n';
            } else {
              message += '⚠️ 建议添加更详细的描述\n';
              allPassed = false;
            }
            
            if (allPassed) {
              message += '\n🎉 PR 描述检查通过！';
            } else {
              message += '\n💡 提示: 请补充 PR 描述，说明变更内容和原因。';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
