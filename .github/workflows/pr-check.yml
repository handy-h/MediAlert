name: PR Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

#
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

jobs:
  quick-check:
    name: PR Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      - name: Step
        run: ./gradlew compileDebugKotlin compileDebugJavaWithJavac --continue

      - name: Step
        run: ./gradlew lintDebug --continue || true

      #
      - name: Check Code Format
        run: ./gradlew ktlintCheck --continue || true

      - name: Step
        run: ./gradlew detekt --continue || true

  detailed-check:
    name: PR Detailed Check
    runs-on: ubuntu-latest
    needs: pr-quick-check
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      #
      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.kt
            **/*.java
            **/*.xml
            **/*.gradle
            **/*.kts

      #
      - name: List Changed Files
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
          echo ""
          echo "Changed file count: ${{ steps.changed-files.outputs.all_changed_files_count }}"

      #
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      #
      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PR Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      #
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      #
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pr-debug-apk-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 3
          if-no-files-found: error

      #
      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'app/build/test-results/testDebugUnitTest';
            
            let testResults = '';
            let totalTests = 0;
            let totalFailures = 0;
            let totalErrors = 0;
            let totalSkipped = 0;
            
            try {
              const files = fs.readdirSync(path);
              for (const file of files) {
                if (file.endsWith('.xml')) {
                  const content = fs.readFileSync(`${path}/${file}`, 'utf8');
                  // 瑙ｆ瀽 XML
                  const testsMatch = content.match(/tests="(\d+)"/);
                  const failuresMatch = content.match(/failures="(\d+)"/);
                  const errorsMatch = content.match(/errors="(\d+)"/);
                  const skippedMatch = content.match(/skipped="(\d+)"/);
                  
                  const tests = testsMatch ? parseInt(testsMatch[1]) : 0;
                  const failures = failuresMatch ? parseInt(failuresMatch[1]) : 0;
                  const errors = errorsMatch ? parseInt(errorsMatch[1]) : 0;
                  const skipped = skippedMatch ? parseInt(skippedMatch[1]) : 0;
                  
                  totalTests += tests;
                  totalFailures += failures;
                  totalErrors += errors;
                  totalSkipped += skipped;
                }
              }
              
              const successRate = totalTests > 0 ? ((totalTests - totalFailures - totalErrors) / totalTests * 100).toFixed(1) : 0;
              
              testResults = `馃搳 **娴嬭瘯缁撴灉**: ${totalTests} 娴嬭瘯, ${totalFailures} 澶辫触, ${totalErrors} 閿欒, ${totalSkipped} 璺宠繃\n`;
              testResults += `鉁?**鎴愬姛鐜?*: ${successRate}%\n`;
              
              if (totalFailures > 0 || totalErrors > 0) {
                testResults += `\n鈿狅笍 **瀛樺湪澶辫触鐨勬祴璇曪紝璇锋鏌ュ苟淇銆?*\n`;
              }
            } catch (e) {
              testResults = '鈿狅笍 鏃犳硶璇诲彇娴嬭瘯缁撴灉\n';
              console.error(e);
            }
            
            const buildStatus = '${{ job.status }}' === 'success' ? '鉁? : '鉂?;
            
            const body = `## 馃 PR 鑷姩鍖栨鏌ョ粨鏋淺n\n${testResults}\n馃摝 **鏋勫缓鐘舵€?*: ${buildStatus} Debug APK 鏋勫缓\n\n*鐢?GitHub Actions 鑷姩鐢熸垚*`;
            
            // 鏌ユ壘鏄惁宸叉湁璇勮
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const botComment = comments.data.find(comment => 
              comment.body.includes('馃 PR 鑷姩鍖栨鏌ョ粨鏋?)
            );
            
            if (botComment) {
              // 鏇存柊鐜版湁璇勮
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              // 鍒涘缓鏂拌瘎璁?              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  # PR Labeler
  pr-labeler:
    name: PR Labeler
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Label PR (if labeler config exists)
        uses: actions/labeler@v5
        if: hashFiles('.github/labeler.yml') != ''
        with:
          configuration-path: .github/labeler.yml
        continue-on-error: true

      - name: Step
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];
            
            if (branch.startsWith('feature/')) {
              labels.push('feature');
            } else if (branch.startsWith('bugfix/') || branch.startsWith('fix/')) {
              labels.push('bugfix');
            } else if (branch.startsWith('hotfix/')) {
              labels.push('hotfix');
            } else if (branch.startsWith('release/')) {
              labels.push('release');
            } else if (branch.startsWith('docs/')) {
              labels.push('documentation');
            } else if (branch.startsWith('refactor/')) {
              labels.push('refactor');
            } else if (branch.startsWith('test/')) {
              labels.push('tests');
            } else if (branch.startsWith('chore/')) {
              labels.push('chore');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            } else {
              console.log('No matching labels for branch:', branch);
            }

  #
  pr-description-check:
    name: Check PR Description
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // 妫€鏌?PR 鎻忚堪鏄惁鍖呭惈蹇呰淇℃伅
            const checks = {
              hasDescription: body.length > 50,
              hasIssue: body.includes('#') || body.includes('issue') || body.includes('Issue') || body.includes(' closes ') || body.includes(' fixes '),
              hasChanges: body.includes('鍙樻洿') || body.includes('change') || body.includes('淇敼') || body.includes('Changes') || body.includes('鏀瑰姩'),
              hasType: body.includes('绫诲瀷') || body.includes('Type') || body.includes('绫诲瀷') || body.includes('feature') || body.includes('bugfix') || body.includes('hotfix')
            };
            
            let message = '## 馃搵 PR 鎻忚堪妫€鏌n\n';
            let allPassed = true;
            
            if (checks.hasDescription) {
              message += '鉁?鍖呭惈瓒冲鐨勬弿杩癨n';
            } else {
              message += '鈿狅笍 寤鸿娣诲姞鏇磋缁嗙殑鎻忚堪\n';
              allPassed = false;
            }
            
            if (checks.hasIssue) {
              message += '鉁?鍏宠仈浜嗙浉鍏?Issue\n';
            } else {
              message += '馃挕 寤鸿鍏宠仈鐩稿叧 Issue锛堜娇鐢?`#123` 鎴?`closes #123`锛塡n';
            }
            
            if (checks.hasChanges) {
              message += '鉁?璇存槑浜嗗彉鏇村唴瀹筡n';
            } else {
              message += '馃挕 寤鸿璇存槑鍏蜂綋鐨勫彉鏇村唴瀹筡n';
              allPassed = false;
            }
            
            if (allPassed) {
              message += '\n馃帀 PR 鎻忚堪妫€鏌ラ€氳繃锛?;
            } else {
              message += '\n馃挕 鎻愮ず: 璇疯ˉ鍏?PR 鎻忚堪锛岃鏄庡彉鏇村唴瀹瑰拰鍘熷洜銆?;
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            let totalAdditions = 0;
            let totalDeletions = 0;
            let totalChanges = 0;
            
            for (const file of files) {
              totalAdditions += file.additions;
              totalDeletions += file.deletions;
              totalChanges += file.changes;
            }
            
            let sizeLabel = '';
            let message = '';
            
            if (totalChanges <= 50) {
              sizeLabel = 'size: XS';
              message = '鉁?PR 澶у皬鍚堥€?(XS)';
            } else if (totalChanges <= 100) {
              sizeLabel = 'size: S';
              message = '鉁?PR 澶у皬鍚堥€?(S)';
            } else if (totalChanges <= 300) {
              sizeLabel = 'size: M';
              message = '鈿狅笍 PR 澶у皬涓瓑 (M)锛屽缓璁€冭檻鎷嗗垎';
            } else if (totalChanges <= 500) {
              sizeLabel = 'size: L';
              message = '鈿狅笍 PR 杈冨ぇ (L)锛屽己鐑堝缓璁媶鍒嗕负澶氫釜灏?PR';
            } else {
              sizeLabel = 'size: XL';
              message = '鉂?PR 杩囧ぇ (XL)锛屽繀椤绘媶鍒嗕互鎻愰珮浠ｇ爜瀹℃煡璐ㄩ噺';
            }
            
            // 娣诲姞澶у皬鏍囩
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [sizeLabel]
              });
            } catch (e) {
              console.log('Label may already exist');
            }
            
            console.log(`PR Size: ${totalChanges} changes (${totalAdditions} additions, ${totalDeletions} deletions)`);
            console.log(message);

  merge-check:
    name: PR Merge Check
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    timeout-minutes: 5
    needs: [pr-quick-check, pr-detailed-check]
    steps:
      - name: Check Merge Requirements
        uses: actions/github-script@v7
        with:
          script: |
            const quickCheck = '${{ needs.pr-quick-check.result }}';
            const detailedCheck = '${{ needs.pr-detailed-check.result }}';
            
            let status = 'success';
            let message = '## 鉁?PR 鍚堝苟妫€鏌n\n';
            
            if (quickCheck === 'success') {
              message += '- 鉁?蹇€熸鏌ラ€氳繃\n';
            } else {
              message += '- 鉂?蹇€熸鏌ュけ璐n';
              status = 'failure';
            }
            
            if (detailedCheck === 'success') {
              message += '- 鉁?璇︾粏妫€鏌ラ€氳繃\n';
            } else {
              message += '- 鉂?璇︾粏妫€鏌ュけ璐n';
              status = 'failure';
            }
            
            if (status === 'success') {
              message += '\n馃帀 鎵€鏈夋鏌ラ€氳繃锛屽彲浠ュ悎骞讹紒';
            } else {
              message += '\n鈿狅笍 璇蜂慨澶嶄笂杩伴棶棰樺悗鍐嶅悎骞躲€?;
            }
            
            // 璁剧疆 commit status
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: status,
              context: 'PR Merge Check',
              description: status === 'success' ? 'All checks passed' : 'Some checks failed'
            });
        continue-on-error: true
