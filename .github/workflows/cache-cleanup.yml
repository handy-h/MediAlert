#
name: Cache Cleanup

on:
  schedule:
    #
    - cron: '0 20 * * 6'
  workflow_dispatch:

jobs:
  #
  cleanup-caches:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cleanup Old Caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const now = new Date();
            const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            let deletedCount = 0;
            let skippedCount = 0;
            
            for (const cache of caches.data.actions_caches) {
              const cacheDate = new Date(cache.created_at);
              
              // 删除 7 天以上的缓存
              if (cacheDate < sevenDaysAgo) {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id
                });
                console.log(`Deleted cache: ${cache.key} (created: ${cache.created_at})`);
                deletedCount++;
              } else {
                skippedCount++;
              }
            }
            
            console.log(`\nSummary:`);
            console.log(`- Deleted: ${deletedCount} caches`);
            console.log(`- Skipped (recent): ${skippedCount} caches`);

  #
  cleanup-runs:
    name: Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
    steps:
      - name: Cleanup Old Runs
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = [
              'ci-cd.yml',
              'pr-check.yml',
              'nightly.yml',
              'security-scan.yml'
            ];
            
            const now = new Date();
            const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
            
            let totalDeleted = 0;
            
            for (const workflow of workflows) {
              try {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflow,
                  per_page: 100,
                  status: 'completed'
                });
                
                let deleted = 0;
                
                for (const run of runs.data.workflow_runs) {
                  const runDate = new Date(run.created_at);
                  
                  // 删除 30 天以上的已完成运行
                  if (runDate < thirtyDaysAgo) {
                    await github.rest.actions.deleteWorkflowRun({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      run_id: run.id
                    });
                    deleted++;
                  }
                }
                
                console.log(`${workflow}: Deleted ${deleted} old runs`);
                totalDeleted += deleted;
              } catch (e) {
                console.log(`Error processing ${workflow}: ${e.message}`);
              }
            }
            
            console.log(`\nTotal deleted: ${totalDeleted} runs`);

  #
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
    steps:
      - name: Cleanup Old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const now = new Date();
            const fourteenDaysAgo = new Date(now.getTime() - 14 * 24 * 60 * 60 * 1000);
            
            let deletedCount = 0;
            let skippedCount = 0;
            
            for (const artifact of artifacts.data.artifacts) {
              const artifactDate = new Date(artifact.created_at);
              
              // 删除 14 天以上的 artifacts（Release 产物除外）
              if (artifactDate < fourteenDaysAgo && !artifact.name.includes('release-')) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted artifact: ${artifact.name} (created: ${artifact.created_at})`);
                deletedCount++;
              } else {
                skippedCount++;
              }
            }
            
            console.log(`\nSummary:`);
            console.log(`- Deleted: ${deletedCount} artifacts`);
            console.log(`- Skipped (recent/release): ${skippedCount} artifacts`);
