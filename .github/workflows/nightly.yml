name: Nightly Build

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      full_analysis:
        description: 'Run full code quality analysis'
        required: false
        default: true
        type: boolean

concurrency:
  group: nightly-build
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

jobs:
  nightly-build:
    name: Nightly Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-android-sdk
        with:
          java-version: ${{ env.JAVA_VERSION }}
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Run Full Code Quality Analysis
        if: github.event.inputs.full_analysis != 'false'
        run: |
          ./gradlew lintDebug --continue || true
          ./gradlew detekt --continue || true
          ./gradlew ktlintCheck --continue || true

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Generate Build Report
        run: |
          REPORT_FILE="build-report.md"
          echo "# MediAlert Nightly Build Report" > $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "| Item | Value |" >> $REPORT_FILE
          echo "|------|-------|" >> $REPORT_FILE
          echo "| Date | $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC) |" >> $REPORT_FILE
          echo "| Commit | ${{ github.sha }} |" >> $REPORT_FILE
          echo "| Branch | ${{ github.ref_name }} |" >> $REPORT_FILE
          echo "| Trigger | ${{ github.event_name == 'schedule' && 'Scheduled' || 'Manual' }} |" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "## Build Status" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "- All builds completed successfully" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "## Artifacts" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "- Debug APK" >> $REPORT_FILE
          echo "- Release APK" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "## Next Steps" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "- [ ] Review build artifacts" >> $REPORT_FILE
          echo "- [ ] Run smoke tests" >> $REPORT_FILE
          echo "- [ ] Check for new dependency updates" >> $REPORT_FILE
          
          cat $REPORT_FILE

      - name: Upload Nightly Builds
        uses: actions/upload-artifact@v4
        with:
          name: nightly-builds-${{ github.run_id }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build-report-${{ github.run_id }}
          path: build-report.md
          retention-days: 7

      - name: Output Build Summary
        run: |
          echo "Nightly build completed"
          echo "Debug APK:"
          ls -lh app/build/outputs/apk/debug/*.apk || true
          echo "Release APK:"
          ls -lh app/build/outputs/apk/release/*.apk || true

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-android-sdk
        with:
          java-version: ${{ env.JAVA_VERSION }}
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Check Dependency Updates
        run: ./gradlew dependencyUpdates -Drevision=release --continue || true

      - name: Run Dependency Security Scan
        run: ./gradlew dependencyCheckAnalyze --continue || true

      - name: Generate Dependency Report Summary
        run: |
          REPORT_FILE="dependency-report.md"
          echo "# Dependency Report" > $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "Generated at: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          if [ -f "build/dependencyUpdates/report.txt" ]; then
            echo "## Available Updates" >> $REPORT_FILE
            echo '```' >> $REPORT_FILE
            cat build/dependencyUpdates/report.txt >> $REPORT_FILE
            echo '```' >> $REPORT_FILE
          else
            echo "## Available Updates" >> $REPORT_FILE
            echo "No dependency update report found." >> $REPORT_FILE
          fi
          
          cat $REPORT_FILE

      - name: Upload Dependency Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-reports-${{ github.run_id }}
          path: |
            build/dependencyUpdates/report.txt
            build/reports/dependency-check-report.html
            dependency-report.md
          retention-days: 7
          if-no-files-found: warn

      - name: Create or Update Dependency Issue
        if: hashFiles('build/dependencyUpdates/report.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'build/dependencyUpdates/report.txt';
            
            if (!fs.existsSync(path)) {
              console.log('No dependency update report found');
              return;
            }
            
            const content = fs.readFileSync(path, 'utf8');
            
            if (!content.includes('->')) {
              console.log('No dependency updates available');
              return;
            }
            
            const title = `Dependency Updates Available - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Available Dependency Updates\n\n\`\`\`\n${content}\n\`\`\`\n\n*This issue was automatically generated by the nightly build workflow.*`;
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies'
            });
            
            const existingIssue = issues.data.find(i => i.title.startsWith('Dependency Updates Available'));
            
            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
              console.log(`Updated issue #${existingIssue.number}`);
            } else {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependencies', 'automated']
              });
              console.log(`Created issue #${newIssue.data.number}`);
            }
        continue-on-error: true

  # Notifications
  notify:
    name: Send Nightly Notification
    runs-on: ubuntu-latest
    needs: [nightly-build, dependency-check]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Determine Overall Status
        id: status
        run: |
          BUILD_RESULT="${{ needs.nightly-build.result }}"
          DEP_RESULT="${{ needs.dependency-check.result }}"
          
          if [ "$BUILD_RESULT" == "success" ] && [ "$DEP_RESULT" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          elif [ "$BUILD_RESULT" == "success" ]; then
            echo "status=partial" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
          
          echo "Build: $BUILD_RESULT"
          echo "Dependency: $DEP_RESULT"

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "MediAlert Nightly Build Notification",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "MediAlert Nightly Build Report"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Build Status:*\n${{ steps.status.outputs.status == 'success' && 'Success' || steps.status.outputs.status == 'partial' && 'Partial Success' || 'Failed' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Dependency Check:*\n${{ needs.dependency-check.result == 'success' && 'Passed' || 'Failed' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run ID:*\n${{ github.run_id }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Details"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Create Failure Issue
        if: needs.nightly-build.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly Build Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Nightly Build Failed\n\n- **Run ID**: ${{ github.run_id }}\n- **Commit**: ${{ github.sha }}\n- **Branch**: ${{ github.ref_name }}\n\n[View build details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n*This issue was automatically generated.*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'automated', 'nightly-build']
            });
        continue-on-error: true
