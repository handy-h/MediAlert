name: Nightly Build

on:
  schedule:
    #
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      full_analysis:
        description: 'Value'
        required: false
        default: true
        type: boolean

#
  group: nightly-build
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

jobs:
  nightly-build:
    name: Nightly Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      - name: Step
        if: github.event.inputs.full_analysis != 'false'
        run: |
          ./gradlew lintDebug --continue || true
          ./gradlew detekt --continue || true
          ./gradlew ktlintCheck --continue || true

      - name: Step
        run: ./gradlew testDebugUnitTest --stacktrace

      #
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Step
        run: |
          REPORT_FILE="build-report.md"
          echo "# 妫ｅ啫顕?MediAlert Nightly Build Report" > $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "| 濡炪倕婀卞ú?| 闁?|" >> $REPORT_FILE
          echo "|------|-----|" >> $REPORT_FILE
          echo "| 闁哄啨鍎插﹢?| $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC) |" >> $REPORT_FILE
          echo "| Commit | ${{ github.sha }} |" >> $REPORT_FILE
          echo "| 闁告帒妫欓弫?| ${{ github.ref_name }} |" >> $REPORT_FILE
          echo "| 閻熸瑱绠戣ぐ?| ${{ github.event_name == 'schedule' && '閻庤纰嶅鍌滄嫬閸愩劌顔? || '闁归潧顑呮慨鈺冩喆閿曗偓瑜? }} |" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "## Build Status" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "闁?All builds completed successfully" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "## Artifacts" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "- Debug APK" >> $REPORT_FILE
          echo "- Release APK" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "## Next Steps" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "- [ ] Review build artifacts" >> $REPORT_FILE
          echo "- [ ] Run smoke tests" >> $REPORT_FILE
          echo "- [ ] Check for new dependency updates" >> $REPORT_FILE
          
          cat $REPORT_FILE

      - name: Step
        uses: actions/upload-artifact@v4
        with:
          name: nightly-builds-${{ github.run_id }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: Step
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build-report-${{ github.run_id }}
          path: build-report.md
          retention-days: 7

      - name: Step
        run: |
          echo "闁?Nightly build completed"
          echo "Debug APK:"
          ls -lh app/build/outputs/apk/debug/*.apk || true
          echo "Release APK:"
          ls -lh app/build/outputs/apk/release/*.apk || true

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      - name: Step
        run: ./gradlew dependencyUpdates -Drevision=release --continue || true

      - name: Step
        run: ./gradlew dependencyCheckAnalyze --continue || true

      #
      - name: Generate Dependency Report Summary
        run: |
          REPORT_FILE="dependency-report.md"
          echo "# 妫ｅ啯鎲?Dependency Report" > $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "闁汇垻鍠愰崹姘跺籍閸洘锛? $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          
          if [ -f "build/dependencyUpdates/report.txt" ]; then
            echo "## Available Updates" >> $REPORT_FILE
            echo '```' >> $REPORT_FILE
            cat build/dependencyUpdates/report.txt >> $REPORT_FILE
            echo '```' >> $REPORT_FILE
          else
            echo "## Available Updates" >> $REPORT_FILE
            echo "No dependency update report found." >> $REPORT_FILE
          fi
          
          cat $REPORT_FILE

      - name: Step
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-reports-${{ github.run_id }}
          path: |
            build/dependencyUpdates/report.txt
            build/reports/dependency-check-report.html
            dependency-report.md
          retention-days: 7
          if-no-files-found: warn

      - name: Step
        if: hashFiles('build/dependencyUpdates/report.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'build/dependencyUpdates/report.txt';
            
            if (!fs.existsSync(path)) {
              console.log('No dependency update report found');
              return;
            }
            
            const content = fs.readFileSync(path, 'utf8');
            
            // 婵☆偀鍋撻柡灞诲劜濡叉悂宕ラ敂鑺ョ畳闁告瑯鍨卞ú鍧楀棘娴兼番鈧?            if (!content.includes('->')) {
              console.log('No dependency updates available');
              return;
            }
            
            const title = `妫ｅ啯鎲?Dependency Updates Available - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Available Dependency Updates\n\n\`\`\`\n${content}\n\`\`\`\n\n*This issue was automatically generated by the nightly build workflow.*`;
            
            // 婵☆偀鍋撻柡灞诲劜濡叉悂宕ラ敃鈧崙锛勨偓娑櫭﹢顏堟儎缁嬫寧鍊遍柡宥呮喘椤ｄ粙鎯?open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies'
            });
            
            const existingIssue = issues.data.find(i => i.title.startsWith('妫ｅ啯鎲?Dependency Updates Available'));
            
            if (existingIssue) {
              // 闁哄洤鐡ㄩ弻濠囨偝閻楀牊绠?issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
              console.log(`Updated issue #${existingIssue.number}`);
            } else {
              // 闁告帗绋戠紓鎾诲棘?issue
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependencies', 'automated']
              });
              console.log(`Created issue #${newIssue.data.number}`);
            }
        continue-on-error: true

  # 通知
  notify:
    name: Send Nightly Notification
    runs-on: ubuntu-latest
    needs: [nightly-build, dependency-check]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Determine Overall Status
        id: status
        run: |
          BUILD_RESULT="${{ needs.nightly-build.result }}"
          DEP_RESULT="${{ needs.dependency-check.result }}"
          
          if [ "$BUILD_RESULT" == "success" ] && [ "$DEP_RESULT" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          elif [ "$BUILD_RESULT" == "success" ]; then
            echo "status=partial" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
          
          echo "Build: $BUILD_RESULT"
          echo "Dependency: $DEP_RESULT"

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "妫ｅ啫顕?MediAlert 濠㈣埖绮撳Λ鍧楀几閸曨偆绱﹂悗鐟版湰閸?,
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "妫ｅ啫顕?MediAlert 濠㈣埖绮撳Λ鍧楀几閸曨偆绱﹂柟韬插劚閹?
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*闁哄瀚紓鎾绘偐閼哥鍋?*\n${{ steps.status.outputs.status == 'success' && '闁?闁瑰瓨鍔曟慨? || steps.status.outputs.status == 'partial' && '闁宠法濯寸粭?闂侇喓鍔岄崹搴ㄥ箣閹邦剙顫? || '闁?濠㈡儼绮剧憴? }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*濞撴碍绻嗙粋鍡椢涢埀顒勫蓟?*\n${{ needs.dependency-check.result == 'success' && '闁?閻庣懓鏈崹? || '闁?濠㈡儼绮剧憴? }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*闁圭粯鍔掑?*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*闁哄啨鍎插﹢?*\n${{ github.run_id }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "闁哄被鍎冲﹢鍛嫚閿旇棄鍓?
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      #
      - name: Create Failure Issue
        if: needs.nightly-build.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `妫ｅ啯鐦?Nightly Build Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Nightly Build Failed\n\n- **Run ID**: ${{ github.run_id }}\n- **Commit**: ${{ github.sha }}\n- **Branch**: ${{ github.ref_name }}\n\n[闁哄被鍎冲﹢鍛交閹邦垼鏀介悹鍥烽檮閸庡滑(${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n*This issue was automatically generated.*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'automated', 'nightly-build']
            });
        continue-on-error: true
