#

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]

jobs:
  #
  stale-issues:
    name: Mark Stale Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Mark Stale Issues
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'

  #
  issue-labeler:
    name: Auto Label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Label Issue by Content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const labels = [];
            
            // й–әе¶Ҳоқүе®“дҫҖејҪйҚҘо„үжҡҜй–ёж»ғиӢҜйҚһеҜёвӮ¬еңӯо”ҠйҚӨж»ҲеҙқйҠҠгғҘзҖ»зјҒ?            if (title.includes('bug') || title.includes('й—ҒжҢҺз‘ЁйЎ•?) || title.includes('зҖ№жӣ—жҷңз»Ё?) || title.includes('crash')) {
              labels.push('bug');
            }
            
            if (title.includes('feature') || title.includes('й–ёж—Ӯе–•йҚҸ?) || title.includes('enhancement') || title.includes('йҗ еӣ¬ж”ұйҗӘ?)) {
              labels.push('feature');
            }
            
            if (title.includes('doc') || title.includes('й–әеӮҡжҙҰйҠҶ?) || title.includes('readme')) {
              labels.push('documentation');
            }
            
            if (title.includes('performance') || title.includes('й–№оғ¬е——еҺҙ') || title.includes('slow') || title.includes('й–ёжҘӢз№қйҠҶ?)) {
              labels.push('performance');
            }
            
            if (title.includes('security') || title.includes('йҗҺз‘°оҳҜйҚҷ?) || title.includes('vulnerability')) {
              labels.push('security');
            }
            
            if (title.includes('ui') || title.includes('й–»пҪ…зҹӮеЁј?) || title.includes('й–әеӢ«еўҪйҠҮ?) || title.includes('йҗўоҲҡе•«йҗӘ?)) {
              labels.push('ui');
            }
            
            if (title.includes('database') || title.includes('й–әдҪәеў—е®“?) || title.includes('room') || title.includes('sql')) {
              labels.push('database');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }

  # step
  welcome:
    name: Welcome Contributors
    runs-on: ubuntu-latest
    if: (github.event_name == 'issues' && github.event.action == 'opened') || (github.event_name == 'pull_request' && github.event.action == 'opened')
    timeout-minutes: 5
    steps:
      - name: Check First Contribution
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload[github.event_name].user.login;
            
            // жҝЎоӮҹеҒ“й–әеұ»е„ійҸҒгӮүе№Ӣй–ҝе¬«РҰй–ёж°ҫз®‘йҚ‘пҝ ејөжҫ¶еәЈо”…й–»?            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all',
              per_page: 1
            });
            
            const isFirstContribution = issues.data.length === 0 || 
              (issues.data.length === 1 && issues.data[0].number === context.issue.number);
            
            if (isFirstContribution) {
              const body = `## жЈЈеҶЁз«ҙ жҝһе—җеһјз»»?@${creator}!\n\nй–№жү®е–•й—ғеқ—е№ғйҠҠгӮҲзӨӢ MediAlert еҰһгӮ…ж№ұеЁІдјҙеҙ‘е§ҳо„ҖжҜүйҗ ж„¶зҙ•зҒҸзӮәж•Қж¶”жўҹ\nйҗ еӣ¬о—“йҲҘжЁ»з©ұе©өж’¶зӘ—\n- [ ] й—ӮеҶЁжҮ“йЎ•зүҲзҰҚ?[йҗ ж„¶зҙ•зҒҸзӮәе№җйҚҘСғзЎҖ](CONTRIBUTING.md)\n- [ ] й—Ғо„„жҪ§йҺҜе©ғзҰҚйҚЎжӣһж•©й–»оҶ»жөҮйЎ«еӨҗжҮ йҚҚжёҳ- [ ] жҝһпҪҲоҮ§жҝ®зӮҙзҰҚйҚЎжҘғз®‘йҗҹжӣҡиғ¶еЁҲжҲқГ№зҖЈо… ж§ё\n\nе©өвҖіеҖ№е©ҖдҪ№зҰ’з’ҒеҙҮз§ҝй—ӮеӮӨеҷЈйЎЈд»Ӣж•ҚзҒһз»ўеҒЁйҸүв•Ғй…ЈеЁҲгҲӨеј®й‘ёйқӣзө№й—ӮеӮӨеҷҜз»ұжҠҲ;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  stale-issues:
    name: PR Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    timeout-minutes: 5
    steps:
      - name: Delete Branch if Merged
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            if (pr.merged) {
              const branch = pr.head.ref;
              
              // еЁ‘ж’із§ҙйҚЁеҪ’жўҪ?main й–ё?develop й–ёжҺ‘жЈҷйҸҒ?              if (branch !== 'main' && branch !== 'develop') {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branch}`
                  });
                  console.log(`Deleted branch: ${branch}`);
                } catch (e) {
                  console.log(`Could not delete branch ${branch}: ${e.message}`);
                }
              }
            }
        continue-on-error: true