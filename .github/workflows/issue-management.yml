name: Issue & PR Management

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  stale-issues:
    name: Mark Stale Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Mark Stale Issues
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'

  issue-labeler:
    name: Auto Label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    timeout-minutes: 5
    steps:
      - name: Label Issue by Content
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const labels = [];
            
            // Auto-label based on keywords
            if (title.includes('bug') || title.includes('crash') || title.includes('error')) {
              labels.push('bug');
            }
            
            if (title.includes('feature') || title.includes('enhancement') || title.includes('request')) {
              labels.push('feature');
            }
            
            if (title.includes('doc') || title.includes('documentation') || title.includes('readme')) {
              labels.push('documentation');
            }
            
            if (title.includes('performance') || title.includes('slow') || title.includes('lag')) {
              labels.push('performance');
            }
            
            if (title.includes('security') || title.includes('vulnerability')) {
              labels.push('security');
            }
            
            if (title.includes('ui') || title.includes('design') || title.includes('layout')) {
              labels.push('ui');
            }
            
            if (title.includes('database') || title.includes('room') || title.includes('sql')) {
              labels.push('database');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }

  welcome:
    name: Welcome Contributors
    runs-on: ubuntu-latest
    if: (github.event_name == 'issues' && github.event.action == 'opened') || (github.event_name == 'pull_request' && github.event.action == 'opened')
    timeout-minutes: 5
    steps:
      - name: Check First Contribution
        uses: actions/github-script@v9
        with:
          script: |
            const creator = context.payload[github.event_name].user.login;
            
            // Check if this is the user's first contribution
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all',
              per_page: 1
            });
            
            const isFirstContribution = issues.data.length === 0 || 
              (issues.data.length === 1 && issues.data[0].number === context.issue.number);
            
            if (isFirstContribution) {
              const body = `## Welcome @${creator}!\n\nThank you for your first contribution to MediAlert!\nPlease make sure to:\n- [ ] Read the [CONTRIBUTING.md](CONTRIBUTING.md)\n- [ ] Follow the code style guidelines\n- [ ] Add tests for your changes\n\nWe appreciate your contribution!`;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  pr-cleanup:
    name: PR Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    timeout-minutes: 5
    steps:
      - name: Delete Branch if Merged
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            
            if (pr.merged) {
              const branch = pr.head.ref;
              
              // Don't delete main or develop branches
              if (branch !== 'main' && branch !== 'develop') {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branch}`
                  });
                  console.log(`Deleted branch: ${branch}`);
                } catch (e) {
                  console.log(`Could not delete branch ${branch}: ${e.message}`);
                }
              }
            }
        continue-on-error: true
