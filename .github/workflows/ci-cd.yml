name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

# е№¶еҸ‘жҺ§еҲ¶пјҡеҗҢдёҖеҲҶж”Ҝ/PR еҸӘдҝқз•ҷжңҖж–°иҝҗиЎҢпјҢеҸ–ж¶Ҳж—§зҡ„
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '9.5.0'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dorg.gradle.parallel=true
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dfile.encoding=UTF-8

jobs:
  # ==========================================
  # йҳ¶ж®ө 1: д»Јз ҒиҙЁйҮҸжЈҖжҹ?  # ==========================================
  code-quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # йқҷжҖҒд»Јз ҒеҲҶжһ?- Detekt (Kotlin)
      - name: Run Detekt Analysis
        run: ./gradlew detekt --continue || true

      # йқҷжҖҒд»Јз ҒеҲҶжһ?- Android Lint
      - name: Run Android Lint
        run: ./gradlew lintDebug --continue || true

      # е®үе…Ёжү«жҸҸ - Dependency Check
      - name: Run Dependency Vulnerability Scan
        run: ./gradlew dependencyCheckAnalyze --continue || true

      # д»Јз Ғж јејҸжЈҖжҹ?      - name: Check Code Format (ktlint)
        run: ./gradlew ktlintCheck --continue || true

      # дёҠдј жҠҘе‘Ҡ
      - name: Upload Lint Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports-${{ github.run_id }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            build/reports/detekt/detekt.html
            build/reports/detekt/detekt.xml
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.xml
          retention-days: 7
          if-no-files-found: warn

      # дёҠдј  Detekt SARIF еҲ?GitHub Security
      - name: Upload Detekt SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('build/reports/detekt/detekt.sarif') != ''
        with:
          sarif_file: build/reports/detekt/detekt.sarif

  # ==========================================
  # йҳ¶ж®ө 2: еҚ•е…ғжөӢиҜ•
  # ==========================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # иҝҗиЎҢеҚ•е…ғжөӢиҜ•
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # з”ҹжҲҗжөӢиҜ•жҠҘе‘Ҡ
      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      # дёҠдј жөӢиҜ•жҠҘе‘Ҡ
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports-${{ github.run_id }}
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: warn

      # д»Јз ҒиҰҶзӣ–зҺ?- JaCoCo
      - name: Generate Coverage Report
        run: ./gradlew jacocoTestReport --continue || true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always() && hashFiles('app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml') != ''
        with:
          files: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          name: medialert-coverage
          verbose: true

  # ==========================================
  # йҳ¶ж®ө 3: йӣҶжҲҗжөӢиҜ• (Android Instrumented Tests)
  # ==========================================
  integration-tests:
    name: Integration Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 33, 34]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # еҗҜз”Ё KVM еҠ йҖ?      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # иҝҗиЎҢ Android жЁЎжӢҹеҷЁжөӢиҜ?      - name: Run Android Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: ./gradlew connectedDebugAndroidTest --stacktrace
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # еўһеҠ и¶…ж—¶д»Ҙеә”еҜ№ж…ўеҗҜеҠЁ
          ndk: 23.1.7779620

      # дёҠдј жөӢиҜ•жҠҘе‘Ҡ
      - name: Upload Instrumented Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-reports-api-${{ matrix.api-level }}-${{ github.run_id }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 7
          if-no-files-found: warn

  # ==========================================
  # йҳ¶ж®ө 4: жһ„е»ә Debug APK
  # ==========================================
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # жһ„е»ә Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # зӯҫеҗҚ Debug APK (дҪҝз”Ё GitHub Secrets)
      - name: Sign Debug APK
        id: sign-debug
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/debug
          signingKeyBase64: ${{ secrets.DEBUG_SIGNING_KEY }}
          alias: ${{ secrets.DEBUG_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.DEBUG_KEY_PASSWORD }}
          keyPassword: ${{ secrets.DEBUG_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        continue-on-error: true

      # дёҠдј  Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_id }}
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error

      # иҫ“еҮә APK дҝЎжҒҜ
      - name: Output APK Info
        run: |
          echo "Debug APK built successfully"
          ls -lh app/build/outputs/apk/debug/*.apk || true
          aapt dump badging app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | grep package || true

  # ==========================================
  # йҳ¶ж®ө 5: жһ„е»ә Release APK/AAB (д»?main еҲҶж”Ҝе’?release)
  # ==========================================
  build-release:
    name: Build Release APK/AAB
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    timeout-minutes: 25
    environment: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew || true

      # и§Јз Ғ Release зӯҫеҗҚеҜҶй’Ҙ
      - name: Decode Release Signing Key
        run: |
          echo "${{ secrets.RELEASE_SIGNING_KEY }}" | base64 -d > app/release.jks
          ls -lh app/release.jks

      # жһ„е»ә Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      # жһ„е»ә Release AAB (Android App Bundle)
      - name: Build Release AAB
        run: ./gradlew bundleRelease
        env:
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      # йӘҢиҜҒ APK зӯҫеҗҚ
      - name: Verify APK Signature
        run: |
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release.apk || true
            echo "APK signature verification completed"
          else
            echo "Release APK not found"
          fi

      # йӘҢиҜҒ AAB зӯҫеҗҚ
      - name: Verify AAB Signature
        run: |
          if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            jarsigner -verify -verbose -certs app/build/outputs/bundle/release/app-release.aab || true
            echo "AAB signature verification completed"
          else
            echo "Release AAB not found"
          fi

      # и®Ўз®—е“ҲеёҢеҖ?      - name: Calculate Checksums
        run: |
          cd app/build/outputs
          echo "# MediAlert Release Checksums" > checksums.txt
          echo "Date: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> checksums.txt
          echo "Commit: ${{ github.sha }}" >> checksums.txt
          echo "" >> checksums.txt
          if [ -f "apk/release/app-release.apk" ]; then
            echo "APK SHA256:" >> checksums.txt
            sha256sum apk/release/*.apk >> checksums.txt
          fi
          if [ -f "bundle/release/app-release.aab" ]; then
            echo "AAB SHA256:" >> checksums.txt
            sha256sum bundle/release/*.aab >> checksums.txt
          fi
          cat checksums.txt

      # дёҠдј  Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_id }}
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: error

      # дёҠдј  Release AAB
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.run_id }}
          path: |
            app/build/outputs/bundle/release/*.aab
          retention-days: 14
          if-no-files-found: error

      # дёҠдј  Checksums
      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums-${{ github.run_id }}
          path: app/build/outputs/checksums.txt
          retention-days: 14

      # жё…зҗҶзӯҫеҗҚеҜҶй’Ҙ
      - name: Clean Signing Key
        if: always()
        run: |
          rm -f app/release.jks
          echo "Signing key cleaned up"

      # иҫ“еҮәжһ„е»әдҝЎжҒҜ
      - name: Output Build Info
        run: |
          echo "Release build completed"
          ls -lh app/build/outputs/apk/release/*.apk || true
          ls -lh app/build/outputs/bundle/release/*.aab || true

  # ==========================================
  # йҳ¶ж®ө 6: еҸ‘еёғеҲ?GitHub Releases
  # ==========================================
  deploy-github:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: build-release
    if: github.event_name == 'release'
    timeout-minutes: 10
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.run_id }}
          path: ./artifacts/apk

      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab-${{ github.run_id }}
          path: ./artifacts/aab

      - name: Download Checksums
        uses: actions/download-artifact@v4
        with:
          name: release-checksums-${{ github.run_id }}
          path: ./artifacts

      # дёҠдј  Release иө„жәҗ
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/apk/*.apk
            ./artifacts/aab/*.aab
            ./artifacts/checksums.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false

  # ==========================================
  # йҳ¶ж®ө 7: йҖҡзҹҘ (Slack/Email)
  # ==========================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.build-release.result }}" == "success" ] || [ "${{ needs.build-release.result }}" == "skipped" ]; then
            if [ "${{ needs.build-debug.result }}" == "success" ]; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack - Success
        if: steps.status.outputs.status == 'success' && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "вң?MediAlert жһ„е»әжҲҗеҠҹпј?,
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "рҹҺү MediAlert CI/CD жөҒж°ҙзәҝжҲҗеҠ?
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*еҲҶж”Ҝ:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*жҸҗдәӨ:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*и§ҰеҸ‘иҖ?*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*зҠ¶жҖ?*\nвң?жҲҗеҠҹ"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "жҹҘзңӢиҜҰжғ…"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack - Failure
        if: steps.status.outputs.status == 'failure' && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "вқ?MediAlert жһ„е»әеӨұиҙҘпј?,
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "рҹҡЁ MediAlert CI/CD жөҒж°ҙзәҝеӨұиҙ?
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*еҲҶж”Ҝ:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*жҸҗдәӨ:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*и§ҰеҸ‘иҖ?*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*зҠ¶жҖ?*\nвқ?еӨұиҙҘ"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*жҹҘзңӢиҜҰжғ…:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|зӮ№еҮ»иҝҷйҮҢ>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # еҸ‘йҖҒйӮ®д»¶йҖҡзҹҘ (еҸҜйҖ?
      - name: Send Email Notification
        if: steps.status.outputs.status == 'failure' && env.EMAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "вқ?MediAlert жһ„е»әеӨұиҙҘ - ${{ github.ref_name }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            MediAlert йЎ№зӣ®жһ„е»әеӨұиҙҘпј?            
            еҲҶж”Ҝ: ${{ github.ref_name }}
            жҸҗдәӨ: ${{ github.sha }}
            и§ҰеҸ‘иҖ? ${{ github.actor }}
            ж—¶й—ҙ: ${{ github.event.head_commit.timestamp }}
            
            жҹҘзңӢиҜҰжғ…: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        continue-on-error: true
