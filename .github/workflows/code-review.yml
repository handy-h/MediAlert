name: Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.kt
            **/*.java
            **/*.xml

      - name: Generate Review Summary
        if: steps.changed-files.outputs.all_changed_files != ''
        uses: actions/github-script@v9
        with:
          script: |
            const files = '${{ steps.changed-files.outputs.all_changed_files }}'.split(' ');
            const fileCount = files.length;
            
            const body = `## Code Review Summary\n\nThis PR modified **${fileCount}** files.\n\nPlease ensure:\n- [ ] Code follows Kotlin coding conventions\n- [ ] New/modified features have corresponding tests\n- [ ] No security vulnerabilities introduced\n- [ ] Performance impact assessed\n\n*This message was auto-generated by GitHub Actions*`;
            
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const botComment = comments.data.find(comment => 
              comment.body.includes('Code Review Summary')
            );
            
            if (!botComment) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  conflict-check:
    name: Check Merge Conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for Conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} || true
          
          if git merge-base --is-ancestor HEAD origin/${{ github.base_ref }}; then
            echo "No conflicts detected"
          else
            echo "Warning: Potential conflicts, please merge latest ${{ github.base_ref }}"
          fi
