#
name: Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

#
concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  #
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.kt
            **/*.java
            **/*.xml

      - name: Generate Review Summary
        if: steps.changed-files.outputs.all_changed_files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const files = '${{ steps.changed-files.outputs.all_changed_files }}'.split(' ');
            const fileCount = files.length;
            
            const body = `## 🔍 代码审查摘要\n\n本次 PR 修改了 **${fileCount}** 个文件。\n\n请确保：\n- [ ] 代码遵循 Kotlin 编码规范\n- [ ] 新增/修改的功能有对应的测试\n- [ ] 没有引入安全漏洞\n- [ ] 性能影响已评估\n\n*此消息由 GitHub Actions 自动生成*`;
            
            // 检查是否已有评论
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const botComment = comments.data.find(comment => 
              comment.body.includes('🔍 代码审查摘要')
            );
            
            if (!botComment) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  #
  conflict-check:
    name: Check Merge Conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} || true
          
          if git merge-base --is-ancestor HEAD origin/${{ github.base_ref }}; then
            echo "✅ 没有冲突"
          else
            echo "⚠️ 可能存在冲突，请合并最新 ${{ github.base_ref }}"
          fi
